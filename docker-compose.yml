# docker-compose.yml
version: "3.9"

services:
  # ── PostgreSQL ─────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: movie_reservation_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: movie_reservation
      POSTGRES_USER: cinema
      POSTGRES_PASSWORD: cinema_secret
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cinema -d movie_reservation"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API Server ─────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: movie_reservation_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://cinema:cinema_secret@db:5432/movie_reservation
      JWT_SECRET: super_secret_jwt_key_change_in_production
      JWT_EXPIRES_IN: 7d
      PORT: 3000
      NODE_ENV: production
      UPLOAD_DIR: /app/uploads
    ports:
      - "3000:3000"
    volumes:
      - uploads:/app/uploads

volumes:
  pg_data:
  uploads:
